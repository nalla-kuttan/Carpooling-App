<div class="rides-dashboard-container">
  <div class="search-and-results-panel">
    <!-- Search Form -->
    <form [formGroup]="rideForm" (ngSubmit)="onSubmit()" class="search-form glass-panel">
      <h2 class="search-title">Find or Post a Ride</h2>
      
      <div class="form-field-group">
        <label for="pickup-location">Pickup Location</label>
        <input
          #puLocation
          id="pickup-location"
          type="text"
          class="place-autocomplete"
          formControlName="pickupLocation"
          placeholder="Enter pickup point in Ontario..."
        />
        <!-- Error message -->
        <div
          *ngIf="
            rideForm.get('pickupLocation').invalid &&
            (rideForm.get('pickupLocation').dirty || rideForm.get('pickupLocation').touched)
          "
          class="form-error-msg"
        >
          Please enter a valid pickup location within Ontario.
        </div>
      </div>

      <div class="form-field-group">
        <label for="dropoff-location">Drop-off Location</label>
        <input
          #doLocation
          id="dropoff-location"
          type="text"
          class="place-autocomplete"
          formControlName="dropoffLocation"
          placeholder="Enter drop-off campus..."
        />
        <!-- Error message -->
        <div
          *ngIf="
            rideForm.get('dropoffLocation').invalid &&
            (rideForm.get('dropoffLocation').dirty || rideForm.get('dropoffLocation').touched)
          "
          class="form-error-msg"
        >
          Please enter a valid drop-off location within Ontario.
        </div>
      </div>

      <div class="form-row-2col">
        <div class="form-field-group">
          <label for="date">Date</label>
          <input
            type="date"
            id="date"
            name="date"
            formControlName="selectedDate"
          />
          <div
            *ngIf="
              rideForm.get('selectedDate').invalid &&
              (rideForm.get('selectedDate').dirty || rideForm.get('selectedDate').touched)
            "
            class="form-error-msg"
          >
            Please enter a future date.
          </div>
        </div>

        <div class="form-field-group">
          <label for="time">Arrival Time</label>
          <input
            type="time"
            id="time"
            name="time"
            formControlName="selectedTime"
          />
          <div
            *ngIf="
              rideForm.get('selectedTime').invalid &&
              (rideForm.get('selectedTime').dirty || rideForm.get('selectedTime').touched)
            "
            class="form-error-msg"
          >
            Please enter a future time.
          </div>
        </div>
      </div>

      <div class="selector-holder">
        <input
          type="checkbox"
          id="match-selector"
          name="match-selector"
          [(ngModel)]="this.useMatchingCheck"
          formControlName="useMatching"
          (click)="this.ridesListComponent.ngOnInit()" 
        />
        <label for="match-selector">Use Interest & Class matching</label>
      </div>

      <div class="button-container">
        <button type="button" class="search-button mat-raised-button" (click)="onSearch()">
          <mat-icon>search</mat-icon>
          <span>Search</span>
        </button>
        <button type="submit" class="create-button mat-raised-button" color="accent">
          <mat-icon>add_circle_outline</mat-icon>
          <span>Create Ride</span>
        </button>
      </div>
    </form>

    <!-- Available Rides List Component -->
    <div class="results-list-wrapper glass-panel">
      <h3 class="results-title">Available Rides</h3>
      <app-available-rides-list #ridesListComponent
        [user]="user"
        [useMatching]="useMatchingCheck" 
        [puLocation]="puLocationInfo" 
        [doLocation]="doLocationInfo"
        [searchParams]="searchParams" 
        (passLocation)="recvLocation($event)">
      </app-available-rides-list>
    </div>
  </div>

  <!-- Map Display Panel -->
  <div class="map-panel glass-panel">
    <app-map #map 
      [pinLocation]="currPinLocation"
      [pickupLocation]="pickupLocation"
      [dropoffLocation]="dropoffLocation"
    ></app-map>
  </div>
</div>
