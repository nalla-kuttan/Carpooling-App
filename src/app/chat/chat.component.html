<div class="chat-wrapper">
  <div class="chat-card glass-panel">
    <!-- Chat Header -->
    <div class="chat-header">
      <div class="chat-header-info">
        <mat-icon class="header-icon">chat_bubble_outline</mat-icon>
        <div>
          <h2>Ride Chat Room</h2>
          <p class="subtitle" *ngIf="rideDetails?.dropoffLocation">{{ rideDetails.dropoffLocation.name }}</p>
        </div>
      </div>
    </div>

    <!-- Messages List Container -->
    <div #messageContainer class="chat-body">
      <ng-container *ngIf="messageList.length === 0; else messagesContainer">
        <div class="chat-empty-state">
          <mat-icon class="empty-icon">sms</mat-icon>
          <p>{{ isLoadingMessage }}</p>
        </div>
      </ng-container>
      
      <ng-template #messagesContainer>
        <div class="messages-list">
          <div 
            *ngFor="let message of messageList" 
            class="message-row"
            [ngClass]="{'message-sent': message?.senderId == user._id, 'message-received': message?.senderId != user._id}"
          >
            <div class="message-bubble">
              <span class="message-sender" *ngIf="message?.senderId != user._id">{{ message?.senderName }}</span>
              <span class="message-sender" *ngIf="message?.senderId == user._id">You</span>
              <p class="message-text">{{ message?.message }}</p>
            </div>
          </div>
        </div>
      </ng-template>
    </div>

    <!-- Input Footer Bar -->
    <div class="chat-footer">
      <div class="input-container">
        <input
          [(ngModel)]="newMessage"
          placeholder="Type your message here..."
          (keydown.enter)="sendMessage()"
          class="message-input"
        />
        <button (click)="sendMessage()" class="send-button mat-raised-button" color="primary">
          <mat-icon>send</mat-icon>
          <span>Send</span>
        </button>
      </div>
    </div>
  </div>
</div>
